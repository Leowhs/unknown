<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="../style.css">
  <title>Treino</title>
  <style>
    h1 {
      margin: 20px;
      text-align: center;
      font-size: 2rem;
    }

    .cards-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .treino-card {
      width: 300px;
      background: rgb(54, 54, 54);
      color: rgb(0, 0, 0);
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s;
      text-align: center;
    }

    .treino-card:hover {
      transform: scale(1.03);
    }

    .treino-card img {
      width: 100px;
      margin-top: 10px;
    }

    /* Estilo do modal */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.8); /* fundo escuro com opacidade */
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      overflow: auto;
    }

    .modal {
      background: white;
      color: #333;
      width: 80%;
      height: 80%;
      padding: 40px;
      text-align: left;
      overflow-y: auto; /* Permite rolar se o conteúdo for muito grande */
      border-radius: 12px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #333;
    }

    .modal h2, .modal p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal h2 {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .modal p {
      font-size: 1rem;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Treinos</h1>

  <div class="cards-container">
    <div class="treino-card" onclick="abrirModal('Inferiores', 'GLÚTEO, PERNAS, PANTURRILHA', 'Esse treino fortalece toda a parte inferior do corpo e melhora o equilíbrio. Foca no fortalecimento muscular das pernas, glúteos e panturrilhas para aumentar a resistência e o equilíbrio corporal. Ideal para quem busca melhorar a postura e a performance em atividades físicas como corrida e levantamento de peso.')">
      <h2>Treino: Inferiores</h2>
      <p>Série: GLÚTEO, PERNAS, PANTURRILHA</p>
      <img src="../media/gym.png" alt="ícone de treino">
    </div>

    <div class="treino-card" onclick="abrirModal('Costas', 'COSTAS, BÍCEPS, OMBRO', 'Ideal para postura e força na parte superior do tronco. Esse treino foca no fortalecimento das costas, bíceps e ombros, proporcionando mais estabilidade, resistência e força para os movimentos diários e atividades que exigem força na parte superior do corpo.')">
      <h2>Treino: Costas</h2>
      <p>Série: COSTAS, BÍCEPS, OMBRO</p>
      <img src="../media/gym.png" alt="ícone de treino">
    </div>

    <div class="treino-card" onclick="abrirModal('Peito', 'PEITO, TRICEPS, OMBRO', 'Foca na parte frontal superior e definição dos braços. Esse treino é voltado para a tonificação do peito, tríceps e ombros, ajudando a melhorar a postura e a força na parte superior do corpo. Além disso, contribui para o aumento da massa muscular e definição da região.')">
      <h2>Treino: Peito</h2>
      <p>Série: PEITO, TRICEPS, OMBRO</p>
      <img src="../media/gym.png" alt="ícone de treino">
    </div>
  </div>

  <div class="overlay" id="modal-overlay">
    <div class="modal">
      <span class="close-btn" onclick="fecharModal()">✖</span>
      <h2 id="modal-title">Treino</h2>
      <p id="modal-serie">Série</p>
      <p id="modal-texto">Descrição completa do treino.</p>
    </div>
  </div>

  <script>
    function abrirModal(titulo, serie, texto) {
      document.getElementById('modal-title').textContent = "Treino: " + titulo;
      document.getElementById('modal-serie').textContent = "Série: " + serie;
      document.getElementById('modal-texto').textContent = texto;
      document.getElementById('modal-overlay').style.display = "flex";
    }

    function fecharModal() {
      document.getElementById('modal-overlay').style.display = "none";
    }
  </script>

</body>
</html>
